[all]
type = "unconditional"
pretty_name = "All"

[global_1000]
type = "site_reports_field"
host_min_ranks_condition = "MIN(global_rank) <= 1000"
pretty_name = "Global 1000"

[sightline]
type = "site_reports_field"
host_min_ranks_condition = "MIN(sightline_rank) <= 1000 OR MIN(global_rank) <= 1000"
pretty_name = "Sightline"

[core]
type = "site_reports_field"
host_min_ranks_condition = "MIN(core_rank) <= 1000 OR MIN(global_rank) <= 1000"
pretty_name = "Core Countries"

[global_5000]
type = "site_reports_field"
host_min_ranks_condition = "MIN(global_rank) <= 5000"
pretty_name = "Global 5000"

[japan_1000]
type = "site_reports_field"
host_min_ranks_condition = "MIN(japan_rank) <= 1000"
pretty_name = "Japan"
country_code = "jp"
tlds = [".jp"]

[japan_1000_mobile]
type = "site_reports_field"
