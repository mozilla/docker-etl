name: update-orphaning-dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'jobs/update-orphaning-dashboard/**'
      - '.github/workflows/job-update-orphaning-dashboard.yml'
  pull_request:
    paths:
      - 'jobs/update-orphaning-dashboard/**'
      - '.github/workflows/job-update-orphaning-dashboard.yml'

jobs:
  build-job-update-orphaning-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build jobs/update-orphaning-dashboard/ -t app:build

      - name: Test Code
        # --entrypoint overrides the image's python -m ... entrypoint so the
        # lint/test commands run instead of being passed to the job as args.
        run: docker run --entrypoint sh app:build -c "black --check . && flake8 . && pytest"

  push-job-update-orphaning-dashboard:
    runs-on: ubuntu-latest
    needs: build-job-update-orphaning-dashboard
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: docker build jobs/update-orphaning-dashboard/ -t gcr.io/${{ secrets.GCP_PROJECT }}/update-orphaning-dashboard_docker_etl:latest

      - name: Push to GCR
        run: docker push gcr.io/${{ secrets.GCP_PROJECT }}/update-orphaning-dashboard_docker_etl:latest
