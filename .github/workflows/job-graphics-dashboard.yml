name: graphics-dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'jobs/graphics-dashboard/**'
      - '.github/workflows/job-graphics-dashboard.yml'
  pull_request:
    paths:
      - 'jobs/graphics-dashboard/**'
      - '.github/workflows/job-graphics-dashboard.yml'

jobs:
  build-job-graphics-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Build the Docker image
        # yamllint disable
        run: |
          docker build jobs/graphics-dashboard -t us-docker.pkg.dev/moz-fx-data-artifacts-prod/docker-etl/graphics-dashboard:latest
        # yamllint enable
      - name: Test Code
        run: docker run us-docker.pkg.dev/moz-fx-data-artifacts-prod/docker-etl/graphics-dashboard:latest pytest --flake8 --black
      - name: Lint Code
        run: docker run us-docker.pkg.dev/moz-fx-data-artifacts-prod/docker-etl/graphics-dashboard:latest flake8

  deploy-to-gar-graphics-dashboard:
    name: Deploy graphics-dashboard to GAR
    runs-on: ubuntu-latest
    needs: [build-job-graphics-dashboard]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Build the Docker image
        # yamllint disable
        run: |
          docker build jobs/graphics-dashboard -t us-docker.pkg.dev/moz-fx-data-artifacts-prod/docker-etl/graphics-dashboard:latest
        # yamllint enable
      - name: Push Docker image latest to GAR
        uses: mozilla-it/deploy-actions/docker-push@v4.3.2
        with:
          project_id: moz-fx-data-artifacts-prod
          image_tags: us-docker.pkg.dev/moz-fx-data-artifacts-prod/docker-etl/graphics-dashboard:latest
          workload_identity_pool_project_number: ${{ vars.GCPV2_WORKLOAD_IDENTITY_POOL_PROJECT_NUMBER }}
          service_account_name: docker-etl
